chemistry: nmc
nominal_capacity_ah: 150
initial_soc: 1.0
ambient_temp_k: 298.15
voltage_low_v: 2.8
voltage_high_v: 4.2
discharge_rates_c:
  - 0.2
  - 1.0
charge_cc_rate: 0.5
cv_cutoff_c_rate: 0.05
rest_min: 10
period_s: 30
output_dir: outputs/baseline_150ah_nmc622_temp_dep_example
parameter_set: Chen2020
model:
  type: dfn
  thermal: lumped
  thermal_coupling:
    enabled: false
    boundary_mode: constant
  thermal_params:
    total_heat_transfer_coefficient_w_m2_k: 120.0
    cell_volume_m3: 0.000726
    cell_cooling_surface_area_m2: 0.0512674863
  temperature_dependence:
    dfn:
      enabled: true
      reference_temp_k: 298.15
      arrhenius_overrides:
        negative_particle_diffusivity_ea_j_mol: 35000.0
        positive_particle_diffusivity_ea_j_mol: 30000.0
        negative_exchange_current_ea_j_mol: 25000.0
        positive_exchange_current_ea_j_mol: 28000.0
solver:
  rtol: 1.0e-6
  atol: 1.0e-8
quality_gate:
  enabled: true
  min_convergence_rate: 0.95
  max_repeat_delta_final_soc: 5.0e-4
  max_repeat_delta_min_v: 5.0e-3
  require_polarization_trend: true
  enforce: true
benchmark:
  enabled: false
  rates_c: [0.2, 1.0]
  repeats: 2
  rest_min: 5
  charge_cc_rate: 0.5
  cv_cutoff_c_rate: 0.05
  period_s: 30
  profiles: [dfn_nmc, dfn_lfp, ecm_nmc, ecm_lfp]
identification_inputs:
  enabled: false
  strict: true
  ocv_points_csv: ""
  cc_cycle_csv: ""
  hppc_points_csv: ""
termination:
  enabled: true
  logic: any_of
  must_hit: false
  apply_to_experiment_modes: true
  conditions:
    - metric: cell_temperature_k
      op: ">="
      threshold: 333.15
      name: cell_temp_limit_60c
    - metric: boundary_temperature_k
      op: ">="
      threshold: 323.15
      name: boundary_temp_limit_50c
sanity_gate:
  enabled: true
  rate_c: 0.5
  discharge_to_v: 3.6
  charge_to_v: 4.1
  period_s: 30
hppc:
  enabled: false
timeseries:
  enabled: false
