chemistry: lfp
nominal_capacity_ah: 130
initial_soc: 1.0
ambient_temp_k: 298.15
voltage_low_v: 2.5
voltage_high_v: 3.6
discharge_rates_c:
  - 0.2
  - 0.5
  - 1.0
charge_cc_rate: 0.5
cv_cutoff_c_rate: 0.05
rest_min: 30
period_s: 30
output_dir: outputs/baseline_130ah_lfp
parameter_set: Prada2013
model:
  type: dfn
  thermal: lumped
  thermal_coupling:
    enabled: false
    boundary_mode: constant
  thermal_params:
    total_heat_transfer_coefficient_w_m2_k: 120.0
    cell_volume_m3: 0.0006292
    cell_cooling_surface_area_m2: 0.0466025934722914
  thermal_property_scales:
    heat_capacity_scale: 1.0
    thermal_conductivity_scale: 1.0
  temperature_dependence:
    dfn:
      enabled: false
      reference_temp_k: 298.15
      arrhenius_overrides: {}
solver:
  rtol: 1.0e-6
  atol: 1.0e-8
quality_gate:
  enabled: true
  min_convergence_rate: 0.95
  max_repeat_delta_final_soc: 5.0e-4
  max_repeat_delta_min_v: 5.0e-3
  require_polarization_trend: true
  enforce: true
benchmark:
  enabled: true
  rates_c:
    - 0.2
    - 1.0
  repeats: 2
  rest_min: 5
  charge_cc_rate: 0.5
  cv_cutoff_c_rate: 0.05
  period_s: 30
  profiles:
    - dfn_nmc
    - dfn_lfp
    - ecm_nmc
    - ecm_lfp
identification_inputs:
  enabled: false
  strict: true
  ocv_points_csv: ""
  cc_cycle_csv: ""
  hppc_points_csv: ""
termination:
  enabled: true
  logic: any_of
  must_hit: false
  apply_to_experiment_modes: true
  conditions:
    - metric: cell_temperature_k
      op: ">="
      threshold: 333.15
      name: cell_temp_limit_60c
    - metric: boundary_temperature_k
      op: ">="
      threshold: 323.15
      name: boundary_temp_limit_50c
sanity_gate:
  enabled: true
  rate_c: 0.5
  discharge_to_v: 3.2
  charge_to_v: 3.5
  period_s: 30
hppc:
  enabled: true
  soc_start: 1.0
  soc_end: 0.05
  soc_step: 0.05
  pulse_c_rate: 1.0
  discharge_s: 10
  charge_s: 10
  rest_minutes: 30
  period_s: 0.1
timeseries:
  enabled: true
  csv_path: ""
  period_s: 0.1
  use_temp_as_ambient_boundary: false
  charge_compare:
    enabled: true
    soc_start: 0.0
    rates_c:
      - 0.1
      - 0.3333333333
      - 1.0
    period_by_rate_s:
      0.1: 1.0
      0.3333333333: 0.1
      1.0: 0.1
    cv_cutoff_c_rate: 0.05
    voltage_high_v: 3.6
