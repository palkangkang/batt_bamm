chemistry: lfp
nominal_capacity_ah: 130
initial_soc: 1.0
ambient_temp_k: 298.15
voltage_low_v: 3.2
voltage_high_v: 4.2
discharge_rates_c:
  - 0.2
  - 1.0
charge_cc_rate: 0.5
cv_cutoff_c_rate: 0.05
rest_min: 10
period_s: 30
output_dir: outputs/baseline_130ah_lfp_ecm_temp_dep_example
parameter_set: ECM_Example
model:
  type: ecm
  thermal: isothermal
  ecm_rc_elements: 2
  # Must point to a fitted pack with schema_version=ecm_temp_2d_v1.
  ecm_fitted_pack_json: outputs/ecm_fit_compare_lfp/fit/ecm_fitted_pack_temp_2d_2rc.json
solver:
  rtol: 1.0e-6
  atol: 1.0e-8
quality_gate:
  enabled: true
  min_convergence_rate: 0.95
  max_repeat_delta_final_soc: 5.0e-4
  max_repeat_delta_min_v: 5.0e-3
  require_polarization_trend: true
  enforce: true
benchmark:
  enabled: false
  rates_c: [0.2, 1.0]
  repeats: 2
  rest_min: 5
  charge_cc_rate: 0.5
  cv_cutoff_c_rate: 0.05
  period_s: 30
  profiles: [dfn_nmc, dfn_lfp, ecm_nmc, ecm_lfp]
identification_inputs:
  enabled: false
  strict: true
  ocv_points_csv: ""
  cc_cycle_csv: ""
  hppc_points_csv: ""
termination:
  enabled: true
  logic: any_of
  must_hit: false
  apply_to_experiment_modes: true
  conditions: []
sanity_gate:
  enabled: false
hppc:
  enabled: false
timeseries:
  enabled: false
